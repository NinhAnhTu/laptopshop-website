# ==============================================================
# 1. CORE SERVER CONFIGURATION
# ==============================================================
spring.application.name=laptopshop
server.port=8080
app.url=http://localhost:8080

# ==============================================================
# 2. DATABASE CONFIGURATION (MySQL)
# ==============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/laptopshop_finall?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=*****
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================================================
# 3. JPA / HIBERNATE CONFIGURATION
# ==============================================================
# ?? none nha ??a nŕo s?a thŕnh update coi ch?ng.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ==============================================================
# 4. THYMELEAF CONFIGURATION
# ==============================================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html
spring.thymeleaf.cache=false

# ==============================================================
# 5. MAIL CONFIGURATION (Gmail SMTP)
# ==============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL@gmail.com
spring.mail.password=YOUR_APP_PASSWORD_HERE
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.debug=false

app.email.from=MAIL
app.email.sender-name=AnhTus Laptop Store
app.email.admin-email=MAIL

# ==============================================================
# 6. SCHEDULING & FILE UPLOAD
# ==============================================================
spring.task.scheduling.enabled=true
spring.task.scheduling.pool.size=5
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==============================================================
# 7. LOGGING
# ==============================================================
logging.level.com.laptopshop=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
logging.file.name=logs/laptopshop.log

# ==============================================================
# 8. ENCODING
# ==============================================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ==============================================================
# 9. GOOGLE OAUTH2 (LOGIN)
# ==============================================================
spring.security.oauth2.client.registration.google.client-id=1044464480174-8ua3jvemlu1ajejuike35juahfe7862n.apps.googleusercontent.com
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRETspring.security.oauth2.client.registration.google.scope=profile, email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth?prompt=select_account

# ==============================================================
# 10. API GEMINI
# ==============================================================
gemini.api.key=YOUR_GEMINI_API_KEY
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent