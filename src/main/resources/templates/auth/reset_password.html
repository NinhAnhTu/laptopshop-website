<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt lại mật khẩu - ChaosCoders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #f4f6f8;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        /* Icon Header */
        .icon-header {
            width: 80px;
            height: 80px;
            background: #fff3e0; /* Cam nhạt */
            color: #f37021;       /* Cam đậm */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            box-shadow: 0 5px 15px rgba(243, 112, 33, 0.2);
        }

        /* Input Group Styles */
        .input-group-text {
            background-color: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-right: none;
            border-top-left-radius: 50px;
            border-bottom-left-radius: 50px;
            padding-left: 20px;
            color: #adb5bd;
        }

        .form-control {
            background-color: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-left: none;
            border-top-right-radius: 50px;
            border-bottom-right-radius: 50px;
            padding: 12px 20px 12px 10px;
            transition: all 0.3s;
        }

        .form-control:focus {
            background-color: #fff;
            box-shadow: none;
            border-color: #f37021;
        }

        .form-control:focus + .input-group-text,
        .input-group:focus-within .input-group-text {
            background-color: #fff;
            border-color: #f37021;
            color: #f37021;
        }

        /* Nút màu cam */
        .btn-primary {
            background-color: #f37021;
            border-color: #f37021;
            border-radius: 50px;
            font-weight: 700;
            padding: 12px 20px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #e66010;
            border-color: #e66010;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(243, 112, 33, 0.3);
        }

        .text-link {
            color: #f37021;
            text-decoration: none;
            font-weight: 600;
        }
        .text-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card mx-auto" style="max-width: 480px;">
        <div class="card-body p-5">

            <div class="icon-header">
                <i class="fas fa-key"></i>
            </div>

            <h3 class="text-center fw-bold text-dark mb-2">Đặt mật khẩu mới</h3>
            <p class="text-muted text-center mb-4 small px-2">
                Vui lòng nhập mật khẩu mới cho tài khoản của bạn.
            </p>

            <div th:if="${error}" class="alert alert-danger rounded-4 border-0 shadow-sm small" role="alert">
                <div class="d-flex align-items-center mb-2">
                    <i class="fas fa-exclamation-triangle me-2"></i> <span th:text="${error}"></span>
                </div>
                <div class="text-center border-top border-danger-subtle pt-2 mt-2">
                    <a href="/forgot-password" class="text-danger fw-bold text-decoration-none">
                        <i class="fas fa-redo me-1"></i> Gửi lại yêu cầu mới
                    </a>
                </div>
            </div>

            <form th:if="${token}" action="/reset-password" method="post">
                <input type="hidden" name="token" th:value="${token}">

                <div class="mb-4">
                    <label class="form-label fw-bold small text-muted ms-3">Mật khẩu mới</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" name="password" class="form-control"
                               placeholder="Nhập ít nhất 6 ký tự..." required minlength="6">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-2">
                    <i class="fas fa-save me-2"></i> Xác nhận đổi mật khẩu
                </button>
            </form>

            <div class="text-center mt-4">
                <a href="/login" class="text-decoration-none text-muted small">
                    <i class="fas fa-arrow-left me-1"></i> Quay lại đăng nhập
                </a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
