<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản - ChaosCoders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #f4f6f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px 0;
        }

        .register-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            overflow: hidden;
            width: 100%;
            max-width: 550px; /* Rộng hơn login xíu để chứa 2 cột */
            background: white;
        }

        /* Icon Header */
        .icon-header {
            width: 70px;
            height: 70px;
            background: #fff3e0;
            color: #f37021;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 28px;
            box-shadow: 0 5px 15px rgba(243, 112, 33, 0.2);
        }

        /* Input Group Styles - Tạo hiệu ứng liền mạch */
        .input-group-text {
            background-color: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-right: none;
            border-top-left-radius: 50px;
            border-bottom-left-radius: 50px;
            padding-left: 20px;
            color: #adb5bd;
        }

        .form-control {
            background-color: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-left: none;
            border-top-right-radius: 50px;
            border-bottom-right-radius: 50px;
            padding: 12px 20px 12px 10px;
            transition: all 0.3s;
        }

        /* Hiệu ứng Focus */
        .form-control:focus {
            background-color: #fff;
            box-shadow: none;
            border-color: #f37021;
        }

        .form-control:focus + .input-group-text,
        .input-group:focus-within .input-group-text {
            background-color: #fff;
            border-color: #f37021;
            color: #f37021;
        }

        /* Validate Error Style */
        .form-control.is-invalid {
            border-color: #dc3545;
            background-image: none; /* Xóa icon lỗi mặc định của bootstrap để k bị chồng chéo */
        }
        .form-control.is-invalid + .input-group-text,
        .input-group:has(.is-invalid) .input-group-text {
            border-color: #dc3545;
            color: #dc3545;
        }

        /* Nút màu cam */
        .btn-primary {
            background-color: #f37021;
            border-color: #f37021;
            border-radius: 50px;
            font-weight: 700;
            padding: 12px 20px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #e66010;
            border-color: #e66010;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(243, 112, 33, 0.3);
        }

        .text-link {
            color: #f37021;
            font-weight: 600;
            text-decoration: none;
            transition: 0.2s;
        }
        .text-link:hover {
            text-decoration: underline;
            color: #d8520e;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card register-card mx-auto">
        <div class="card-body p-4 p-md-5">

            <div class="icon-header">
                <i class="fas fa-user-plus"></i>
            </div>

            <h3 class="text-center fw-bold text-dark mb-2">Đăng ký tài khoản</h3>
            <p class="text-center text-muted small mb-4">Trở thành thành viên để nhận nhiều ưu đãi!</p>

            <div th:if="${error}" class="alert alert-danger rounded-4 border-0 shadow-sm small d-flex align-items-center mb-4" role="alert">
                <i class="fas fa-exclamation-triangle me-2"></i> <span th:text="${error}"></span>
            </div>

            <form th:action="@{/register}" th:object="${user}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted ms-3">Họ và tên</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" th:field="*{fullname}" class="form-control" placeholder=""
                               th:classappend="${#fields.hasErrors('fullname')} ? 'is-invalid' : ''">
                    </div>
                    <div class="text-danger small ms-3 mt-1" th:if="${#fields.hasErrors('fullname')}" th:errors="*{fullname}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted ms-3">Số điện thoại</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-phone"></i></span>
                        <input type="text" th:field="*{phone}" class="form-control" placeholder="SĐT 10 số"
                               th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''">
                    </div>
                    <div class="text-danger small ms-3 mt-1" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted ms-3">Email đăng nhập</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="email@example.com"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''">
                    </div>
                    <div class="text-danger small ms-3 mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="row g-2 mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold small text-muted ms-3">Mật khẩu</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" th:field="*{password}" class="form-control" placeholder="******"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''">
                        </div>
                        <div class="text-danger small ms-2 mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold small text-muted ms-3">Nhập lại</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-check-circle"></i></span>
                            <input type="password" th:field="*{confirmPassword}" class="form-control" placeholder="******"
                                   th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''">
                        </div>
                        <div class="text-danger small ms-2 mt-1" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-4">
                    Đăng ký ngay <i class="fas fa-arrow-right ms-2"></i>
                </button>

                <div class="text-center">
                    <span class="text-muted small">Đã có tài khoản?</span>
                    <a th:href="@{/login}" class="text-link ms-1">Đăng nhập</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
