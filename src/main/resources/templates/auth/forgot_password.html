<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quên mật khẩu - ChaosCoders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #f4f6f8;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        /* Icon ổ khóa ở trên */
        .icon-header {
            width: 80px;
            height: 80px;
            background: #fff3e0; /* Cam nhạt */
            color: #f37021;       /* Cam đậm */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            box-shadow: 0 5px 15px rgba(243, 112, 33, 0.2);
        }

        /* Input bo tròn */
        .form-control {
            border-radius: 50px;
            padding: 12px 25px;
            border: 1px solid #e0e0e0;
            background-color: #f9f9f9;
            transition: all 0.3s;
        }

        .form-control:focus {
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(243, 112, 33, 0.1);
            border-color: #f37021;
        }

        /* Nút màu cam */
        .btn-primary {
            background-color: #f37021;
            border-color: #f37021;
            border-radius: 50px;
            font-weight: 700;
            padding: 12px 20px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #e66010;
            border-color: #e66010;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(243, 112, 33, 0.3);
        }

        .text-link {
            color: #6c757d;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .text-link:hover {
            color: #f37021;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card mx-auto" style="max-width: 480px;">
        <div class="card-body p-5">

            <div class="icon-header">
                <i class="fas fa-unlock-alt"></i>
            </div>

            <h3 class="text-center fw-bold text-dark mb-2">Quên mật khẩu?</h3>
            <p class="text-muted text-center mb-4 small px-3">
                Đừng lo lắng! Hãy nhập email đã đăng ký, chúng tôi sẽ gửi hướng dẫn đặt lại mật khẩu cho bạn.
            </p>

            <div th:if="${error}" class="alert alert-danger rounded-4 border-0 shadow-sm small d-flex align-items-center" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i> <span th:text="${error}"></span>
            </div>
            <div th:if="${message}" class="alert alert-success rounded-4 border-0 shadow-sm small d-flex align-items-center" role="alert">
                <i class="fas fa-check-circle me-2"></i> <span th:text="${message}"></span>
            </div>

            <form action="/forgot-password" method="post">
                <div class="mb-4">
                    <label class="form-label fw-bold small text-muted ms-3">Địa chỉ Email</label>
                    <div class="input-group">
                        <input type="email" name="email" class="form-control" placeholder="nhapemail@example.com" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-4">
                    Gửi yêu cầu <i class="fas fa-paper-plane ms-2"></i>
                </button>
            </form>

            <div class="text-center border-top pt-4">
                <a href="/login" class="text-decoration-none text-link">
                    <i class="fas fa-arrow-left me-1"></i> Quay lại trang đăng nhập
                </a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
