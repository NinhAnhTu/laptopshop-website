<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
</head>
<body>
<nav th:fragment="header" class="navbar navbar-expand-lg navbar-dark shadow-sm"
     style="background-color: #022140; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <div class="container">
        <a class="navbar-brand fw-bold text-uppercase" href="/" style="letter-spacing: 1px;">LAPTOPSHOP</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto ms-3">
                <li class="nav-item"><a class="nav-link text-white" href="/">Trang chủ</a></li>

                <li class="nav-item">
                    <a class="nav-link fw-bold text-white" href="/store">
                        <i></i> Sản phẩm
                    </a>
                </li>
            </ul>

            <ul class="navbar-nav">
                <li class="nav-item me-3">
                    <a class="nav-link position-relative text-white" href="/cart">
                        <i class="fas fa-shopping-cart"></i> Giỏ hàng

                        <span class="position-absolute start-100 translate-middle badge rounded-pill bg-danger"
                              style="top: 8px; font-size: 0.7rem;"
                              th:text="${cartCount}">0</span>
                    </a>
                </li>

                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="btn btn-outline-light btn-sm mt-1 ms-2 px-3 rounded-pill" href="/login">Đăng nhập</a>
                </li>

                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle d-flex align-items-center text-white" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="fas fa-user-circle fa-lg me-2"></i>
                        <th:block th:if="${currentUser != null}">
                            <span th:text="${currentUser.fullname}">User Name</span>
                        </th:block>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                        <li><a class="dropdown-item" href="/account"><i class="fas fa-user me-2 text-muted"></i>Tài khoản</a></li>
                        <li sec:authorize="hasRole('ADMIN')">
                            <a class="dropdown-item" href="/admin/dashboard"><i class="fas fa-tachometer-alt me-2 text-muted"></i>Quản trị Admin</a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button class="dropdown-item text-danger" type="submit"><i class="fas fa-sign-out-alt me-2"></i>Đăng xuất</button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
