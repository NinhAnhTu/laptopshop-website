<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ChaosCoders</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* --- ADMIN THEME --- */
        :root {
            --sidebar-width: 260px;
            --sidebar-bg: linear-gradient(180deg, #0f2027 0%, #203a43 100%);
            --text-color: #aeb9cc;
            --text-hover: #ffffff;
            --active-bg: #f37021; /* Cam chủ đạo */
            --active-shadow: 0 4px 15px rgba(243, 112, 33, 0.4);
            --hover-bg: rgba(255, 255, 255, 0.1);
            --light-bg: #f3f4f6;
        }

        body {
            background-color: var(--light-bg);
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 1. SIDEBAR (Cố định bên trái) */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            color: white;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 15px rgba(0,0,0,0.1);
            overflow-y: auto; /* Cho phép cuộn nếu menu dài */
        }

        /* Logo Area */
        .sidebar-brand {
            padding: 25px 20px;
            font-size: 1.5rem;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-decoration: none;
            text-align: center;
            display: block;
        }
        .sidebar-brand i { color: var(--active-bg); }

        /* Menu Items */
        .sidebar-menu {
            padding: 20px 15px;
            flex-grow: 1;
        }

        .menu-header {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #6c757d;
            font-weight: 700;
            margin: 15px 0 5px 10px;
            letter-spacing: 0.5px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            color: var(--text-color);
            padding: 12px 15px;
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 5px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .sidebar-link i {
            width: 30px;
            font-size: 1.1rem;
            text-align: center;
            margin-right: 10px;
            transition: 0.3s;
        }

        .sidebar-link:hover {
            background-color: var(--hover-bg);
            color: var(--text-hover);
            transform: translateX(5px);
        }
        .sidebar-link:hover i { color: var(--active-bg); }

        .sidebar-link.active {
            background-color: var(--active-bg);
            color: white;
            box-shadow: var(--active-shadow);
            font-weight: 600;
        }
        .sidebar-link.active i { color: white; }

        /* Footer */
        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
        }

        /* 2. CONTENT WRAPPER */
        .content-wrapper {
            margin-left: var(--sidebar-width);
            padding: 30px;
            width: calc(100% - var(--sidebar-width));
            min-height: 100vh;
            transition: all 0.3s;
        }

        .sidebar::-webkit-scrollbar { width: 5px; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 5px; }
    </style>
</head>
<body>

<nav class="sidebar">
    <a href="/admin/dashboard" class="sidebar-brand">
        <i class="fas fa-bolt me-2"></i>Chaos<span class="text-white">Admin</span>
    </a>

    <div class="sidebar-menu">

        <div class="menu-header">Tổng quan</div>
        <a th:href="@{/admin/dashboard}" class="sidebar-link"
           th:classappend="${activePage == 'dashboard'} ? 'active'">
            <i class="fas fa-tachometer-alt"></i> Dashboard
        </a>

        <div class="menu-header">Bán hàng</div>
        <a th:href="@{/admin/orders}" class="sidebar-link"
           th:classappend="${activePage == 'orders'} ? 'active'">
            <i class="fas fa-shopping-cart"></i> Đơn hàng
        </a>
        <a th:href="@{/admin/products}" class="sidebar-link"
           th:classappend="${activePage == 'products'} ? 'active'">
            <i class="fas fa-laptop"></i> Sản phẩm
        </a>
        <a th:href="@{/admin/vouchers}" class="sidebar-link"
           th:classappend="${activePage == 'vouchers'} ? 'active'">
            <i class="fas fa-ticket-alt"></i> Mã giảm giá
        </a>

        <div class="menu-header">Quản lý kho & Đối tác</div>
        <a th:href="@{/admin/inventory}" class="sidebar-link"
           th:classappend="${activePage == 'inventory'} ? 'active'">
            <i class="fas fa-warehouse"></i> Kho hàng
        </a>
        <a th:href="@{/admin/brands}" class="sidebar-link"
           th:classappend="${activePage == 'brands'} ? 'active'">
            <i class="fas fa-tags"></i> Thương hiệu
        </a>
        <a th:href="@{/admin/suppliers}" class="sidebar-link"
           th:classappend="${activePage == 'suppliers'} ? 'active'">
            <i class="fas fa-truck"></i> Nhà cung cấp
        </a>

        <div class="menu-header">Người dùng & CSKH</div>
        <a th:href="@{/admin/users}" class="sidebar-link"
           th:classappend="${activePage == 'users'} ? 'active'">
            <i class="fas fa-users"></i> Người dùng
        </a>

        <a th:href="@{/admin/reviews}" class="sidebar-link"
           th:classappend="${activePage == 'reviews'} ? 'active'">
            <i class="fas fa-star-half-alt"></i> Quản lý Đánh giá
        </a>

        <a th:href="@{/admin/warranties}" class="sidebar-link"
           th:classappend="${activePage == 'warranties'} ? 'active'">
            <i class="fas fa-shield-alt"></i> Bảo hành
        </a>
        <a th:href="@{/admin/chat}" class="sidebar-link"
           th:classappend="${activePage == 'chat'} ? 'active'">
            <i class="fas fa-comments"></i> Hỗ trợ Chat
        </a>

    </div>

    <div class="sidebar-footer">
        <a href="/" target="_blank" class="btn btn-outline-light w-100 btn-sm mb-2 rounded-pill">
            <i class="fas fa-external-link-alt me-2"></i>Xem Website
        </a>

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-danger w-100 btn-sm rounded-pill fw-bold">
                <i class="fas fa-sign-out-alt me-2"></i>Đăng xuất
            </button>
        </form>
    </div>
</nav>

<div class="content-wrapper">
    <div class="container-fluid">
        <div th:replace="${content}"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
