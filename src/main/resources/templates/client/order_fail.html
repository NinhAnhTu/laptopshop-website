<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán thất bại - ChaosCoders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- TONE MÀU CHỦ ĐẠO --- */
        :root {
            --primary-blue: #0f2027;
            --secondary-blue: #203a43;
            --accent-orange: #f37021;
            --light-bg: #f8f9fa;
            --soft-blue-bg: #c4dff6;
        }

        body {
            background-color: var(--light-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Page Wrapper - Căn giữa nội dung theo chiều dọc */
        .page-wrapper {
            background: linear-gradient(180deg, var(--soft-blue-bg) 0%, #ffffff 40%, #ffffff 100%);
            min-height: 85vh; /* Giảm một chút để trừ hao header */
            display: flex;
            align-items: center;
            padding-bottom: 3rem;
        }

        /* Card Style */
        .status-card {
            background: white;
            border: none;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(15, 32, 39, 0.1);
            overflow: hidden;
            position: relative;
        }

        /* Nút bấm */
        .btn-custom-orange {
            background-color: var(--accent-orange);
            color: white;
            border: none;
            font-weight: 700;
            border-radius: 50px;
            padding: 12px 30px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(243, 112, 33, 0.3);
        }
        .btn-custom-orange:hover {
            background-color: #d35400;
            color: white;
            transform: translateY(-2px);
        }

        .btn-outline-custom {
            border: 2px solid #dee2e6;
            color: var(--secondary-blue);
            font-weight: 600;
            border-radius: 50px;
            padding: 12px 30px;
            transition: all 0.3s;
        }
        .btn-outline-custom:hover {
            background-color: #f8f9fa;
            border-color: var(--secondary-blue);
            color: var(--primary-blue);
        }

        /* Ảnh Huuloc */
        .fail-image {
            max-width: 100%;
            height: auto;
            max-height: 250px; /* Giới hạn chiều cao để không bị quá to */
            object-fit: contain;
            margin: 1.5rem 0;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="page-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card status-card p-5 text-center">

                    <h2 class="text-danger fw-bold mb-1">
                        <i class="fas fa-times-circle me-2"></i>Thanh Toán Thất Bại
                    </h2>
                    <p class="text-muted">Rất tiếc, giao dịch không thể hoàn tất.</p>

                    <img th:src="@{/images/huuloc.png}" alt="Failed" class="fail-image">

                    <div class="mt-3 mb-4">
                        <p class="fw-bold text-dark mb-1" style="font-size: 1.1rem;">Đơn hàng của bạn đã bị hủy tự động.</p>
                        <p class="small text-muted">
                            Vui lòng kiểm tra lại phương thức thanh toán hoặc thử đặt hàng lại nhé.
                        </p>
                    </div>

                    <div class="d-flex flex-column gap-3 justify-content-center">
                        <a href="/cart" class="btn btn-custom-orange">
                            <i class="fas fa-redo me-2"></i>Thử lại (Quay về Giỏ hàng)
                        </a>
                        <a href="/" class="btn btn-outline-custom">
                            <i class="fas fa-home me-2"></i>Về Trang chủ
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
