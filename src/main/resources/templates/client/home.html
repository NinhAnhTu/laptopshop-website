<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ - Laptop Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- TONE MÀU CHỦ ĐẠO --- */
        :root {
            --primary-blue: #0f2027;
            --accent-orange: #f37021;
            --light-bg: #f8f9fa;
            --soft-blue-bg: #c4dff6;
        }

        body {
            background-color: var(--light-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .product-section-wrapper {
            background: linear-gradient(180deg, var(--soft-blue-bg) 0%, #ffffff 25%, #ffffff 75%, var(--soft-blue-bg) 100%);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 4px 20px rgba(15, 32, 39, 0.08);
            margin-bottom: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* PRODUCT CARD */
        .product-card {
            transition: all 0.3s ease;
            height: 100%;
            border: none;
            border-radius: 15px;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            border-bottom: 4px solid var(--accent-orange);
        }

        .card-img-top {
            height: 200px;
            object-fit: contain;
            padding: 20px;
            transition: transform 0.3s;
        }
        .product-card:hover .card-img-top {
            transform: scale(1.05);
        }

        .card-body { padding: 1.5rem; }

        .price {
            color: var(--accent-orange);
            font-weight: 800;
            font-size: 1.2rem;
        }

        /* BUTTONS & PAGINATION */
        .btn-custom-orange {
            background-color: var(--accent-orange);
            color: white;
            border: none;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-custom-orange:hover {
            background-color: #d35400;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(243, 112, 33, 0.4);
        }

        .pagination .page-link { color: var(--primary-blue); border-radius: 5px; margin: 0 3px; background: white; }
        .pagination .active .page-link {
            background-color: var(--accent-orange);
            border-color: var(--accent-orange);
            color: white;
        }

        /* BADGE HOT */
        .badge-hot {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.75rem;
            box-shadow: 0 4px 10px rgba(255, 75, 43, 0.4);
            z-index: 10;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 75, 43, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255, 75, 43, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 75, 43, 0); }
        }

        .logo-circle {
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            aspect-ratio: 1/1;
            object-fit: cover;
        }

        /* --- STYLE CHO GỢI Ý TÌM KIẾM --- */
        .suggestion-item {
            transition: background-color 0.2s;
            cursor: pointer;
            text-decoration: none;
        }
        .suggestion-item:hover {
            background-color: #f8f9fa;
        }

        /* Đảm bảo hiển thị ĐÈ LÊN MỌI THỨ */
        #searchResults {
            position: absolute;
            top: 100%; /* Nằm ngay dưới ô input */
            left: 0;
            width: 100%;
            z-index: 99999 !important; /* Rất cao để không bị che */
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.25); /* Đổ bóng đậm hơn chút để nổi */
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid rgba(0,0,0,0.1);
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="py-5 mb-5" style="background: linear-gradient(to right, #022140 0%, #053b69 40%, #2b86c5 100%); position: relative;">

    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 1;">
        <div style="position: absolute; top: -100px; right: -50px; width: 400px; height: 400px; background: rgba(255, 255, 255, 0.05); border-radius: 50%;"></div>
        <div style="position: absolute; bottom: -50px; left: -100px; width: 300px; height: 300px; background: rgba(255, 255, 255, 0.03); border-radius: 50%;"></div>
    </div>

    <div class="container-fluid px-lg-5 position-relative" style="z-index: 10;">
        <div class="row align-items-center">
            <div class="col-md-4 col-lg-3 text-center mb-4 mb-md-0">
                <img th:src="@{/images/logo.png}" alt="LAPTOP SHOP"
                     class="img-fluid logo-circle"
                     style="width: 180px; height: 180px;"
                     onerror="this.style.display='none'; document.getElementById('backup-title').style.display='block';">
                <h1 id="backup-title" style="display:none;" class="fw-bold text-white display-4 mt-3">CHAOSCODERS</h1>
            </div>

            <div class="col-md-8 col-lg-9 text-center text-md-start text-white">
                <h2 class="fw-bold mb-3 display-5">CHAOSCODERS</h2>
                <p class="lead mb-4 opacity-90 fs-4">Uy tín - Chất lượng - Thương hiệu</p>

                <form action="/" method="get" class="w-100 position-relative" style="max-width: 800px;">
                    <div class="input-group input-group-lg shadow-lg rounded-pill overflow-visible p-1 bg-white">
                        <input type="text" name="keyword"
                               id="searchInput"
                               class="form-control border-0 ps-4 rounded-pill"
                               placeholder="Bạn cần tìm máy gì?"
                               th:value="${keyword}"
                               style="font-size: 1rem;"
                               autocomplete="off">
                        <button class="btn btn-custom-orange rounded-pill px-5 m-1 fw-bold" type="submit">
                            <i class="fas fa-search me-2"></i>Tìm kiếm
                        </button>
                    </div>

                    <div id="searchResults" class="list-group mt-2" style="display: none; text-align: left;">
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<div class="container mb-5 position-relative" style="z-index: 5;">

    <div th:if="${recommendedProducts != null and not #lists.isEmpty(recommendedProducts)}"
         class="product-section-wrapper">

        <div class="d-flex align-items-center mb-4 pb-2 border-bottom" style="border-color: rgba(15, 32, 39, 0.1) !important;">
            <div class="bg-warning text-white rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 40px; height: 40px;">
                <i class="fas fa-magic fa-lg"></i>
            </div>
            <div>
                <h4 class="fw-bold m-0" style="color: #203a43;">DÀNH RIÊNG CHO BẠN</h4>
                <small class="text-muted">Dựa trên những gì bạn quan tâm</small>
            </div>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
            <div class="col" th:each="product : ${recommendedProducts}">
                <div class="card product-card h-100" style="border-bottom: 4px solid #ffc107;"> <a th:href="@{'/product/' + ${product.slug}}" class="text-decoration-none d-block text-center pt-3">
                    <img th:if="${not #lists.isEmpty(product.images)}" th:src="${product.images[0].url}" class="card-img-top">
                    <img th:if="${#lists.isEmpty(product.images)}" src="https://via.placeholder.com/300" class="card-img-top">
                </a>
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title text-truncate mb-3">
                            <a th:href="@{'/product/' + ${product.slug}}" class="text-dark text-decoration-none fw-bold" th:text="${product.productName}"></a>
                        </h6>
                        <div class="mt-auto">
                            <div class="price mb-2" th:text="${#numbers.formatDecimal(product.salePrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></div>
                            <a th:href="@{'/product/' + ${product.slug}}" class="btn btn-outline-warning w-100 rounded-pill btn-sm py-2 fw-bold text-dark">
                                <i class="fas fa-magic me-1"></i> Khám phá
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:if="${(keyword == null || keyword == '') && bestSellers != null && !bestSellers.isEmpty()}"
         class="product-section-wrapper">

        <div class="d-flex align-items-center mb-4 pb-2 border-bottom" style="border-color: rgba(15, 32, 39, 0.1) !important;">
            <div class="bg-danger text-white rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 40px; height: 40px;">
                <i class="fas fa-fire fa-lg"></i>
            </div>
            <div>
                <h4 class="fw-bold m-0" style="color: #203a43;">SẢN PHẨM BÁN CHẠY</h4>
                <small class="text-muted">Mua nhanh kẻo hết</small>
            </div>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
            <div class="col" th:each="product : ${bestSellers}">
                <div class="card product-card h-100">
                    <div class="badge-hot"><i class="fas fa-fire me-1"></i>HOT</div>
                    <a th:href="@{'/product/' + ${product.slug}}" class="text-decoration-none d-block text-center pt-3">
                        <img th:if="${not #lists.isEmpty(product.images)}" th:src="${product.images[0].url}" class="card-img-top">
                        <img th:if="${#lists.isEmpty(product.images)}" src="https://via.placeholder.com/300" class="card-img-top">
                    </a>
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title text-truncate mb-3">
                            <a th:href="@{'/product/' + ${product.slug}}" class="text-dark text-decoration-none fw-bold" th:text="${product.productName}"></a>
                        </h6>
                        <div class="mt-auto">
                            <div class="price mb-2" th:text="${#numbers.formatDecimal(product.salePrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></div>
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <span class="small text-muted"><i class="fas fa-star text-warning"></i> 5.0</span>
                                <small class="text-danger fw-bold" style="font-size: 0.8rem; background: #ffeaea; padding: 2px 8px; border-radius: 4px;">Đã bán nhiều</small>
                            </div>
                            <a th:href="@{'/product/' + ${product.slug}}" class="btn btn-custom-orange w-100 rounded-pill btn-sm py-2">
                                <i class="fas fa-shopping-cart me-1"></i> Xem ngay
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="product-section-wrapper">
        <div class="d-flex align-items-center mb-4 pb-2 border-bottom"
             th:if="${keyword == null || keyword == ''}"
             style="border-color: rgba(15, 32, 39, 0.1) !important;">
            <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 40px; height: 40px;">
                <i class="fas fa-laptop fa-lg"></i>
            </div>
            <h4 class="fw-bold m-0" style="color: #203a43;">TẤT CẢ SẢN PHẨM</h4>
        </div>

        <h4 class="mb-4 pb-2 border-bottom" th:if="${keyword != null && keyword != ''}">
            Kết quả tìm kiếm: "<span class="text-primary fw-bold" th:text="${keyword}"></span>"
        </h4>

        <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
            <div class="col" th:each="product : ${products}">
                <div class="card product-card h-100">
                    <a th:href="@{'/product/' + ${product.slug}}" class="text-decoration-none d-block text-center pt-3">
                        <img th:if="${not #lists.isEmpty(product.images)}" th:src="${product.images[0].url}" class="card-img-top">
                        <img th:if="${#lists.isEmpty(product.images)}" src="https://via.placeholder.com/300" class="card-img-top">
                    </a>
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title text-truncate mb-3">
                            <a th:href="@{'/product/' + ${product.slug}}" class="text-dark text-decoration-none fw-bold" th:text="${product.productName}"></a>
                        </h6>
                        <div class="mt-auto">
                            <div class="price mb-2" th:text="${#numbers.formatDecimal(product.salePrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></div>

                            <a th:href="@{'/product/' + ${product.slug}}" class="btn btn-custom-orange w-100 rounded-pill btn-sm py-2">
                                <i class="fas fa-shopping-cart me-1"></i> Xem chi tiết
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <nav class="mt-5" th:if="${totalPages > 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                    <a class="page-link shadow-sm" th:href="@{/(page=${currentPage - 1}, keyword=${keyword})}"><i class="fas fa-chevron-left"></i></a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i} ? 'active'">
                    <a class="page-link shadow-sm" th:href="@{/(page=${i}, keyword=${keyword})}" th:text="${i}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                    <a class="page-link shadow-sm" th:href="@{/(page=${currentPage + 1}, keyword=${keyword})}"><i class="fas fa-chevron-right"></i></a>
                </li>
            </ul>
        </nav>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        let timeout = null;

        const formatCurrency = (amount) => {
            if (!amount) return '0 đ';
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
        };

        // Hàm gọi API lưu lịch sử tìm kiếm (Chạy ngầm)
        const recordSearchHistory = (keyword) => {
            // Sử dụng navigator.sendBeacon để gửi request ngay cả khi trang đang chuyển đi
            // Hoặc fetch thông thường
            const formData = new FormData();
            formData.append('keyword', keyword);

            fetch(`/api/products/record-click?keyword=${encodeURIComponent(keyword)}`, {
                method: 'POST'
            }).catch(err => console.log('Không lưu được lịch sử:', err));
        };

        searchInput.addEventListener('input', function() {
            const keyword = this.value.trim();
            clearTimeout(timeout);

            if (keyword.length < 1) {
                searchResults.style.display = 'none';
                searchResults.innerHTML = '';
                return;
            }

            timeout = setTimeout(() => {
                fetch(`/api/products/search-suggestions?keyword=${keyword}`)
                    .then(response => response.json())
                    .then(data => {
                        searchResults.innerHTML = '';
                        if (data && data.length > 0) {
                            searchResults.style.display = 'block';
                            data.forEach(product => {
                                const slug = product.slug ? product.slug : '#';
                                const item = document.createElement('div'); // Dùng div thay thẻ a để dễ xử lý click
                                item.className = 'list-group-item list-group-item-action d-flex align-items-center p-2 border-0 border-bottom suggestion-item';
                                item.style.cursor = 'pointer';

                                item.innerHTML = `
                                    <img src="${product.imageUrl}" style="width: 50px; height: 50px; object-fit: contain; margin-right: 15px; border-radius: 5px; border: 1px solid #eee;">
                                    <div>
                                        <div class="fw-bold text-dark" style="font-size: 0.95rem;">${product.productName}</div>
                                        <div class="text-danger small fw-bold">${formatCurrency(product.salePrice)}</div>
                                    </div>
                                `;

                                // [QUAN TRỌNG] Bắt sự kiện click
                                item.addEventListener('click', function() {
                                    // 1. Lưu tên sản phẩm vào lịch sử
                                    recordSearchHistory(product.productName);

                                    // 2. Chuyển trang sau một khoảng trễ cực nhỏ để API kịp chạy (hoặc chạy song song)
                                    window.location.href = `/product/${slug}`;
                                });

                                searchResults.appendChild(item);
                            });
                        } else {
                            searchResults.style.display = 'none';
                        }
                    })
                    .catch(err => console.error('Lỗi:', err));
            }, 300);
        });

        document.addEventListener('click', function(e) {
            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                searchResults.style.display = 'none';
            }
        });
    });
</script>

</body>
</html>
