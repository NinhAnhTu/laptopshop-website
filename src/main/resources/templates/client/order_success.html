<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt hàng thành công - ChaosCoders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- TONE MÀU CHỦ ĐẠO --- */
        :root {
            --primary-blue: #0f2027;
            --secondary-blue: #203a43;
            --accent-orange: #f37021;
            --light-bg: #f8f9fa;
            --soft-blue-bg: #c4dff6;
        }

        body {
            background-color: var(--light-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Page Wrapper */
        .page-wrapper {
            background: linear-gradient(180deg, var(--soft-blue-bg) 0%, #ffffff 40%, #ffffff 100%);
            min-height: 85vh;
            display: flex;
            align-items: center;
            padding-bottom: 3rem;
        }

        /* Success Card */
        .success-card {
            background: white;
            border: none;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(15, 32, 39, 0.1);
            overflow: hidden;
            position: relative;
            padding: 40px;
        }

        /* Icon Animation */
        .success-icon-wrapper {
            display: inline-block;
            margin-bottom: 20px;
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .success-icon {
            font-size: 80px;
            background: linear-gradient(45deg, #28a745, #20c997);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 10px rgba(40, 167, 69, 0.3));
        }

        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Timeline Steps (Trang trí) */
        .steps-container {
            display: flex;
            justify-content: center;
            margin: 30px 0;
            position: relative;
        }
        .step {
            text-align: center;
            width: 80px;
            position: relative;
            z-index: 2;
        }
        .step-icon {
            width: 40px; height: 40px;
            background: #eee;
            border-radius: 50%;
            line-height: 40px;
            margin: 0 auto 10px;
            color: #999;
            transition: all 0.3s;
        }
        .step.active .step-icon {
            background: var(--accent-orange);
            color: white;
            box-shadow: 0 4px 10px rgba(243, 112, 33, 0.3);
        }
        .step-text { font-size: 0.8rem; color: #777; font-weight: 600; }
        .step.active .step-text { color: var(--accent-orange); }

        /* Progress Line */
        .progress-line {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 3px;
            background: #eee;
            z-index: 1;
        }

        /* Buttons */
        .btn-custom-orange {
            background-color: var(--accent-orange);
            color: white;
            border: none;
            font-weight: 700;
            border-radius: 50px;
            padding: 12px 30px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(243, 112, 33, 0.3);
        }
        .btn-custom-orange:hover {
            background-color: #d35400;
            color: white;
            transform: translateY(-2px);
        }

        .btn-outline-custom {
            border: 2px solid #dee2e6;
            color: var(--secondary-blue);
            font-weight: 600;
            border-radius: 50px;
            padding: 12px 30px;
            transition: all 0.3s;
        }
        .btn-outline-custom:hover {
            background-color: #f8f9fa;
            border-color: var(--secondary-blue);
            color: var(--primary-blue);
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="page-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card success-card text-center">

                    <div class="success-icon-wrapper">
                        <i class="fas fa-check-circle success-icon"></i>
                    </div>

                    <h2 class="fw-bold mb-2" style="color: var(--primary-blue);">Đặt hàng thành công!</h2>
                    <p class="text-muted mb-4">Cảm ơn bạn đã tin tưởng và mua sắm tại ChaosCoders.<br>Mã xác nhận đã được gửi tới Email của bạn.</p>

                    <div class="steps-container">
                        <div class="progress-line"></div>

                        <div class="step active">
                            <div class="step-icon"><i class="fas fa-file-alt"></i></div>
                            <div class="step-text">Đã đặt</div>
                        </div>
                        <div class="step">
                            <div class="step-icon"><i class="fas fa-box-open"></i></div>
                            <div class="step-text">Đóng gói</div>
                        </div>
                        <div class="step">
                            <div class="step-icon"><i class="fas fa-truck"></i></div>
                            <div class="step-text">Giao hàng</div>
                        </div>
                    </div>

                    <div class="alert alert-light border border-dashed rounded-3 p-3 mb-4 d-inline-block text-start w-100">
                        <small class="text-muted d-block mb-1"><i class="fas fa-info-circle me-1 text-info"></i> <b>Lưu ý:</b></small>
                        <small class="text-muted">Nhân viên sẽ sớm liên hệ qua số điện thoại để xác nhận đơn hàng trước khi giao.</small>
                    </div>

                    <div class="d-flex flex-column flex-sm-row gap-3 justify-content-center">
                        <a href="/" class="btn btn-outline-custom">
                            <i class="fas fa-arrow-left me-2"></i>Về trang chủ
                        </a>
                        <a href="/account" class="btn btn-custom-orange">
                            <i class="fas fa-eye me-2"></i>Theo dõi đơn hàng
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
