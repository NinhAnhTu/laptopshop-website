<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/admin_layout :: layout(~{:: .content-body})}">
<head>
    <title>Thêm nhà cung cấp - ChaosCoders</title>
</head>
<body>

<div class="content-body">

    <div class="d-flex justify-content-between align-items-center mb-4 pt-3">
        <div>
            <h2 class="fw-bold text-dark mb-0">Thêm nhà cung cấp</h2>
            <small class="text-muted"></small>
        </div>
        <a href="/admin/suppliers" class="btn btn-outline-secondary rounded-pill px-4">
            <i class="fas fa-arrow-left me-2"></i>Quay lại danh sách
        </a>
    </div>

    <div class="card border-0 shadow-sm rounded-4" style="max-width: 900px; margin: 0 auto;">
        <div class="card-body p-4">
            <form action="/admin/suppliers/save" method="post" th:object="${supplier}">

                <h6 class="fw-bold text-secondary text-uppercase mb-4">
                    <i class="fas fa-info-circle me-2"></i>Thông tin chung
                </h6>

                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold small text-muted">Tên nhà cung cấp <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-building text-muted"></i></span>
                            <input type="text" class="form-control border-start-0 py-2 fw-bold"
                                   th:field="*{supplierName}" required placeholder="">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold small text-muted">Người liên hệ</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
                            <input type="text" class="form-control border-start-0 py-2"
                                   th:field="*{contactName}" placeholder="">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold small text-muted">Email liên hệ</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                            <input type="email" class="form-control border-start-0 py-2"
                                   th:field="*{email}" placeholder="contact@example.com">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold small text-muted">Số điện thoại</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-phone text-muted"></i></span>
                            <input type="text" class="form-control border-start-0 py-2"
                                   th:field="*{phone}" placeholder="STĐ 10 số">
                        </div>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-bold small text-muted">Địa chỉ kho/Văn phòng</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-map-marker-alt text-muted"></i></span>
                            <input type="text" class="form-control border-start-0 py-2"
                                   th:field="*{address}" placeholder="Nhập địa chỉ đầy đủ...">
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-5 pt-3 border-top">
                    <a href="/admin/suppliers" class="btn btn-light rounded-pill px-4 fw-bold">Hủy bỏ</a>
                    <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold"
                            style="background-color: #f37021; border-color: #f37021;">
                        <i class="fas fa-save me-2"></i>Lưu lại
                    </button>
                </div>
            </form>
        </div>
    </div>

</div>

</body>
</html>
