<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/admin_layout :: layout(~{:: .content-body})}">
<head>
    <title>Thêm hãng mới - ChaosCoders</title>
</head>
<body>

<div class="content-body">

    <div class="d-flex justify-content-between align-items-center mb-4 pt-3">
        <h2 class="fw-bold text-dark">Thêm hãng mới</h2>
        <a href="/admin/brands" class="btn btn-outline-secondary rounded-pill px-4">
            <i class="fas fa-arrow-left me-2"></i>Quay lại
        </a>
    </div>

    <div class="row">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">

                    <form action="/admin/brands/save" method="post" th:object="${brand}" enctype="multipart/form-data">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên hãng <span class="text-danger">*</span></label>
                            <input type="text" class="form-control py-2" th:field="*{brandName}"
                                   placeholder="Nhập tên hãng sản xuất" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Quốc gia</label>
                            <input type="text" class="form-control py-2" th:field="*{country}"
                                   placeholder="">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Logo hãng</label>
                            <input type="file" name="imageFile" class="form-control" accept="image/*">
                            <div class="form-text">Định dạng hỗ trợ: .jpg, .png, .jpeg</div>
                        </div>

                        <div class="text-end border-top pt-3">
                            <a href="/admin/brands" class="btn btn-light rounded-pill px-4 me-2">Hủy bỏ</a>
                            <button type="submit" class="btn btn-primary rounded-pill px-4"
                                    style="background-color: #f37021; border-color: #f37021;">
                                <i class="fas fa-save me-2"></i>Lưu lại
                            </button>
                        </div>
                    </form>

                </div>
            </div>
        </div>

        <div class="col-md-4 d-none d-md-block">
            <div class="alert alert-info border-0 rounded-4 shadow-sm">
                <h5><i class="fas fa-info-circle me-2"></i>Lưu ý</h5>
                <p class="small mb-0">
                    - Tên hãng là bắt buộc.<br>
                    - Logo nên có kích thước vuông hoặc chữ nhật ngang để hiển thị đẹp nhất trên trang chủ.<br>
                    - Dung lượng ảnh không quá 2MB.
                </p>
            </div>
        </div>
    </div>

</div>

</body>
</html>
