<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/admin_layout :: layout(~{:: .content-body})}">
<head>
    <title>Cập nhật hãng - ChaosCoders</title>
</head>
<body>

<div class="content-body">

    <div class="d-flex justify-content-between align-items-center mb-4 pt-3">
        <h2 class="fw-bold text-dark">Cập nhật thông tin hãng</h2>
        <a href="/admin/brands" class="btn btn-outline-secondary rounded-pill px-4">
            <i class="fas fa-arrow-left me-2"></i>Quay lại
        </a>
    </div>

    <div class="row">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">

                    <form action="/admin/brands/save" method="post" th:object="${brand}" enctype="multipart/form-data">
                        <input type="hidden" th:field="*{brandId}">
                        <input type="hidden" th:field="*{logoUrl}">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên hãng <span class="text-danger">*</span></label>
                            <input type="text" class="form-control py-2" th:field="*{brandName}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Quốc gia</label>
                            <input type="text" class="form-control py-2" th:field="*{country}">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Logo hiện tại</label>
                            <div class="d-flex align-items-center mb-2">
                                <div class="p-2 border rounded-3 bg-light d-inline-block">
                                    <img th:if="${brand.logoUrl != null}" th:src="${brand.logoUrl}"
                                         height="80" class="d-block" alt="Logo cũ" style="object-fit: contain;">
                                    <span th:if="${brand.logoUrl == null}" class="text-muted small fst-italic p-2">Chưa có logo</span>
                                </div>
                            </div>

                            <label class="form-label small text-muted mt-2">Chọn logo mới (Bỏ trống nếu giữ nguyên)</label>
                            <input type="file" name="imageFile" class="form-control" accept="image/*">
                        </div>

                        <div class="text-end border-top pt-3">
                            <a href="/admin/brands" class="btn btn-light rounded-pill px-4 me-2">Hủy bỏ</a>
                            <button type="submit" class="btn btn-primary rounded-pill px-4"
                                    style="background-color: #f37021; border-color: #f37021;">
                                <i class="fas fa-save me-2"></i>Cập nhật
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-4 d-none d-md-block">
            <div class="alert alert-warning border-0 rounded-4 shadow-sm">
                <h5><i class="fas fa-exclamation-triangle me-2"></i>Lưu ý</h5>
                <p class="small mb-0">
                    - Bạn đang chỉnh sửa thông tin của hãng: <strong>[[${brand.brandName}]]</strong>.<br>
                    - Nếu không tải ảnh mới lên, logo cũ sẽ được giữ nguyên.<br>
                    - Hãy kiểm tra kỹ tên và quốc gia trước khi lưu.
                </p>
            </div>
        </div>
    </div>

</div>

</body>
</html>
