<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/admin_layout :: layout(~{:: .content-body})}">
<head>
    <title>Quản lý bảo hành - ChaosCoders</title>
</head>
<body>

<div class="content-body">

    <div class="d-flex justify-content-between align-items-center mb-4 pt-3">
        <div>
            <h2 class="fw-bold text-dark mb-0">Quản lý bảo hành</h2>
            <small class="text-muted"></small>
        </div>

        <a href="/admin/warranties/scan" class="btn btn-outline-primary rounded-pill px-4 fw-bold"
           title="Cập nhật trạng thái các đơn hết hạn" data-bs-toggle="tooltip">
            <i class="fas fa-sync-alt me-2"></i>Quét hết hạn
        </a>
    </div>

    <div class="card border-0 shadow-sm rounded-4 mb-4">
        <div class="card-body p-4">
            <form action="/admin/warranties" method="get" class="row g-3 align-items-center">
                <div class="col-md-10">
                    <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 rounded-start-pill ps-3">
                                <i class="fas fa-search text-muted"></i>
                            </span>
                        <input type="text" name="keyword" class="form-control border-start-0 rounded-end-pill py-2"
                               placeholder="Nhập mã bảo hành, tên khách, SĐT hoặc tên sản phẩm..."
                               th:value="${keyword}">
                    </div>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold py-2"
                            style="background-color: #f37021; border-color: #f37021;">
                        <i class="fas fa-search me-1"></i> Tìm kiếm
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-header bg-white border-bottom py-3 px-4 d-flex justify-content-between align-items-center">
            <h6 class="mb-0 fw-bold text-secondary">Danh sách phiếu bảo hành</h6>
            <span class="badge bg-light text-dark border rounded-pill px-3"
                  th:text="${warranties.size()} + ' phiếu'">0 phiếu</span>
        </div>

        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light text-secondary text-uppercase small">
                    <tr>
                        <th class="ps-4 py-3">Mã Bảo Hành</th>
                        <th class="py-3">Khách hàng</th>
                        <th class="py-3">Sản phẩm</th>
                        <th class="py-3">Thời hạn</th>
                        <th class="py-3 text-center">Trạng thái</th>
                        <th class="text-end pe-4 py-3">Hành động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(warranties)}">
                        <td colspan="6" class="text-center py-5 text-muted">
                            <div class="opacity-50 mb-3">
                                <i class="fas fa-clipboard-check fa-3x"></i>
                            </div>
                            <p class="mb-0">Không tìm thấy dữ liệu bảo hành nào.</p>
                        </td>
                    </tr>

                    <tr th:each="w : ${warranties}">
                        <td class="ps-4">
                            <div class="d-flex flex-column">
                                <span class="fw-bold text-primary font-monospace" th:text="${w.warrantyCode}">WC-12345</span>
                                <small class="text-muted fst-italic" th:if="${w.warrantyPolicy != null}">
                                    <i class="fas fa-shield-alt me-1 text-secondary"></i>
                                    <span th:text="${w.warrantyPolicy.policyName}">Gói vàng</span>
                                </small>
                            </div>
                        </td>

                        <td>
                            <div class="d-flex align-items-center">
                                <div class="bg-light rounded-circle p-2 me-2 text-secondary">
                                    <i class="fas fa-user"></i>
                                </div>
                                <div>
                                    <div class="fw-bold text-dark" th:text="${w.user.fullname}">Nguyen Van A</div>
                                    <small class="text-muted"><i class="fas fa-phone-alt me-1" style="font-size: 10px;"></i><span th:text="${w.user.phone}">0909...</span></small>
                                </div>
                            </div>
                        </td>

                        <td>
                            <span class="fw-bold text-dark" th:text="${w.product.productName}">Laptop Dell</span>
                        </td>

                        <td>
                            <div class="small">
                                <div class="mb-1">
                                    <span class="text-muted">Mua:</span>
                                    <span th:text="${#temporals.format(w.purchaseDate, 'dd/MM/yyyy')}"></span>
                                </div>
                                <div>
                                    <span class="text-muted">Hết hạn:</span>
                                    <strong class="text-dark" th:text="${#temporals.format(w.expirationDate, 'dd/MM/yyyy')}"></strong>
                                </div>
                            </div>
                        </td>

                        <td class="text-center">
                                    <span th:if="${w.status == 'ACTIVE'}"
                                          class="badge bg-success-subtle text-success border border-success-subtle rounded-pill px-3">
                                        <i class="fas fa-check-circle me-1"></i> Đang bảo hành
                                    </span>
                            <span th:if="${w.status == 'EXPIRED'}"
                                  class="badge bg-secondary-subtle text-secondary border border-secondary-subtle rounded-pill px-3">
                                        <i class="fas fa-clock me-1"></i> Đã hết hạn
                                    </span>
                            <span th:if="${w.status == 'VOID'}"
                                  class="badge bg-danger-subtle text-danger border border-danger-subtle rounded-pill px-3">
                                        <i class="fas fa-ban me-1"></i> Từ chối BH
                                    </span>
                        </td>

                        <td class="text-end pe-4">
                            <a th:href="@{/admin/warranties/edit/{id}(id=${w.id})}"
                               class="btn btn-outline-warning btn-sm rounded-circle"
                               title="Chỉnh sửa trạng thái" data-bs-toggle="tooltip">
                                <i class="fas fa-edit"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card-footer bg-white py-3 border-top-0"></div>
    </div>
</div>

<script>
    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
    var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
        return new bootstrap.Tooltip(tooltipTriggerEl)
    })
</script>

</body>
</html>
