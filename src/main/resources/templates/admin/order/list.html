<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/admin_layout :: layout(~{:: .content-body})}">
<head>
    <title>Quản lý đơn hàng - ChaosCoders</title>
</head>
<body>

<div class="content-body">

    <div class="d-flex justify-content-between align-items-center mb-4 pt-3">
        <div>
            <h2 class="fw-bold text-dark mb-0">Quản lý đơn hàng</h2>
            <small class="text-muted"></small>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 mb-4">
        <div class="card-header bg-white border-bottom-0 pt-4 px-4 pb-0">
            <h6 class="fw-bold text-secondary text-uppercase mb-0">
                <i class="fas fa-filter me-2 text-primary"></i>Bộ lọc tìm kiếm
            </h6>
        </div>
        <div class="card-body p-4">
            <form action="/admin/orders" method="get" class="row g-3">

                <div class="col-md-4">
                    <label class="form-label fw-bold small text-muted">Từ khóa</label>
                    <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 rounded-start-pill ps-3">
                                <i class="fas fa-search text-muted"></i>
                            </span>
                        <input type="text" class="form-control border-start-0 rounded-end-pill py-2" name="keyword"
                               placeholder="Mã đơn, tên khách, SĐT..." th:value="${keyword}">
                    </div>
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-bold small text-muted">Trạng thái</label>
                    <select class="form-select rounded-pill py-2" name="status">
                        <option value="">-- Tất cả trạng thái --</option>
                        <option value="Chờ xác nhận" th:selected="${status == 'Chờ xác nhận'}">🟡 Chờ xác nhận</option>
                        <option value="Đã xác nhận" th:selected="${status == 'Đã xác nhận'}">🔵 Đã xác nhận</option>
                        <option value="Đang giao" th:selected="${status == 'Đang giao'}">🚚 Đang giao</option>
                        <option value="Đã giao" th:selected="${status == 'Đã giao'}">✅ Đã giao</option>
                        <option value="Đã thanh toán" th:selected="${status == 'Đã thanh toán'}">💰 Đã thanh toán</option>
                        <option value="Đã hủy" th:selected="${status == 'Đã hủy'}">❌ Đã hủy</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-bold small text-muted">Ngày đặt</label>
                    <input type="date" class="form-control rounded-pill py-2" name="date" th:value="${date}">
                </div>

                <div class="col-md-2 d-flex align-items-end">
                    <div class="d-flex w-100 gap-2">
                        <button type="submit" class="btn btn-primary w-75 rounded-pill fw-bold py-2"
                                style="background-color: #f37021; border-color: #f37021;">
                            Lọc
                        </button>
                        <a href="/admin/orders" class="btn btn-light border w-25 rounded-circle d-flex align-items-center justify-content-center"
                           style="width: 42px; height: 42px;" title="Làm mới" data-bs-toggle="tooltip">
                            <i class="fas fa-sync-alt text-secondary"></i>
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-header bg-white border-bottom py-3 px-4 d-flex justify-content-between align-items-center">
            <h6 class="mb-0 fw-bold text-secondary">Danh sách đơn hàng</h6>
            <span class="badge bg-light text-dark border rounded-pill px-3"
                  th:text="${orders.size()} + ' đơn'">0 đơn</span>
        </div>

        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light text-secondary text-uppercase small">
                    <tr>
                        <th class="ps-4 py-3">Mã ĐH</th>
                        <th class="py-3">Khách hàng</th>
                        <th class="py-3">Ngày đặt</th>
                        <th class="py-3 text-end">Tổng tiền</th>
                        <th class="py-3 text-center">Trạng thái</th>
                        <th class="text-end pe-4 py-3">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${orders.isEmpty()}">
                        <td colspan="6" class="text-center py-5 text-muted">
                            <div class="opacity-50 mb-3">
                                <i class="fas fa-file-invoice fa-3x"></i>
                            </div>
                            <p class="mb-0">Không tìm thấy đơn hàng nào.</p>
                        </td>
                    </tr>

                    <tr th:each="order : ${orders}">
                        <td class="ps-4">
                            <span class="badge bg-light text-primary border fw-bold" th:text="'#' + ${order.orderId}">#101</span>
                        </td>

                        <td>
                            <div class="d-flex align-items-center">
                                <div class="bg-light rounded-circle p-2 me-2 text-secondary">
                                    <i class="fas fa-user"></i>
                                </div>
                                <div>
                                    <div th:text="${order.shippingName}" class="fw-bold text-dark" style="font-size: 0.95rem;">Nguyen A</div>
                                    <small class="text-muted" th:text="${order.shippingPhone}">0909...</small>
                                </div>
                            </div>
                        </td>

                        <td class="text-muted small">
                            <i class="far fa-calendar-alt me-1"></i>
                            <span th:text="${#temporals.format(order.createdAt, 'dd-MM-yyyy HH:mm')}">12-12-2024</span>
                        </td>

                        <td class="text-end fw-bold text-danger">
                            <span th:text="${#numbers.formatDecimal(order.finalAmount, 0, 'COMMA', 0, 'POINT')}">500,000</span> đ
                        </td>

                        <td class="text-center">
                                    <span th:if="${order.status == 'Chờ xác nhận'}" class="badge bg-warning-subtle text-warning-emphasis border border-warning rounded-pill px-3">
                                        Chờ xác nhận
                                    </span>
                            <span th:if="${order.status == 'Đã xác nhận'}" class="badge bg-info-subtle text-info-emphasis border border-info rounded-pill px-3">
                                        Đã xác nhận
                                    </span>
                            <span th:if="${order.status == 'Đang giao'}" class="badge bg-primary-subtle text-primary border border-primary rounded-pill px-3">
                                        <i class="fas fa-truck me-1"></i> Đang giao
                                    </span>
                            <span th:if="${order.status == 'Đã giao' || order.status == 'Đã thanh toán'}" class="badge bg-success-subtle text-success border border-success rounded-pill px-3">
                                        <i class="fas fa-check me-1"></i> Thành công
                                    </span>
                            <span th:if="${order.status == 'Đã hủy'}" class="badge bg-danger-subtle text-danger border border-danger rounded-pill px-3">
                                        <i class="fas fa-times me-1"></i> Đã hủy
                                    </span>
                        </td>

                        <td class="text-end pe-4">
                            <a th:href="@{/admin/orders/view/{id}(id=${order.orderId})}"
                               class="btn btn-outline-primary btn-sm rounded-pill px-3 fw-bold"
                               title="Xem chi tiết">
                                <i class="fas fa-eye me-1"></i> Xem
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card-footer bg-white py-3 border-top-0">
        </div>
    </div>

</div>

<script>
    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
    var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
        return new bootstrap.Tooltip(tooltipTriggerEl)
    })
</script>

</body>
</html>
