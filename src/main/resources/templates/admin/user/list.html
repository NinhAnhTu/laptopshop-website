<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/admin_layout :: layout(~{:: .content-body})}">
<head>
    <title>Quản lý người dùng - ChaosCoders</title>
</head>
<body>

<div class="content-body">

    <div class="d-flex justify-content-between align-items-center mb-4 pt-3">
        <div>
            <h2 class="fw-bold text-dark mb-0">Quản lý người dùng</h2>
            <small class="text-muted"></small>
        </div>
        <a href="/admin/users/create" class="btn btn-primary rounded-pill px-4 fw-bold"
           style="background-color: #f37021; border-color: #f37021;">
            <i class="fas fa-plus me-2"></i>Thêm người dùng
        </a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm rounded-3" role="alert">
        <i class="fas fa-check-circle me-2"></i> <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm rounded-3" role="alert">
        <i class="fas fa-exclamation-circle me-2"></i> <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm rounded-4 mb-4">
        <div class="card-header bg-white border-bottom-0 pt-4 px-4 pb-0">
            <h6 class="fw-bold text-secondary text-uppercase mb-0">
                <i class="fas fa-filter me-2 text-primary"></i>Tìm kiếm người dùng
            </h6>
        </div>
        <div class="card-body p-4">
            <form action="/admin/users" method="get" class="row g-3">

                <div class="col-md-6">
                    <label class="form-label fw-bold small text-muted">Từ khóa</label>
                    <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 rounded-start-pill ps-3">
                                <i class="fas fa-search text-muted"></i>
                            </span>
                        <input type="text" class="form-control border-start-0 rounded-end-pill py-2" name="keyword"
                               placeholder="Nhập họ tên, email hoặc SĐT..." th:value="${keyword}">
                    </div>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-bold small text-muted">Vai trò</label>
                    <select class="form-select rounded-pill py-2" name="roleId">
                        <option value="">-- Tất cả vai trò --</option>
                        <option th:each="role : ${roles}"
                                th:value="${role.userTypeId}"
                                th:text="${role.typeName}"
                                th:selected="${role.userTypeId == selectedRoleId}"></option>
                    </select>
                </div>

                <div class="col-md-2 d-flex align-items-end">
                    <div class="d-flex w-100 gap-2">
                        <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold py-2"
                                style="background-color: #f37021; border-color: #f37021;">
                            Tìm kiếm
                        </button>
                        <a href="/admin/users" class="btn btn-light border rounded-circle d-flex align-items-center justify-content-center"
                           style="width: 42px; height: 42px;" title="Làm mới" data-bs-toggle="tooltip">
                            <i class="fas fa-sync-alt text-secondary"></i>
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-header bg-white border-bottom py-3 px-4 d-flex justify-content-between align-items-center">
            <h6 class="mb-0 fw-bold text-secondary">Danh sách tài khoản</h6>
            <span class="badge bg-light text-dark border rounded-pill px-3"
                  th:text="${users.size()} + ' tài khoản'">0 tài khoản</span>
        </div>

        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light text-secondary text-uppercase small">
                    <tr>
                        <th class="ps-4 py-3">ID</th>
                        <th class="py-3">Họ và tên</th>
                        <th class="py-3">Liên hệ</th>
                        <th class="py-3 text-center">Vai trò</th>
                        <th class="text-end pe-4 py-3">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${users.isEmpty()}">
                        <td colspan="5" class="text-center py-5 text-muted">
                            <div class="opacity-50 mb-3">
                                <i class="fas fa-users-slash fa-3x"></i>
                            </div>
                            <p class="mb-0">Không tìm thấy người dùng nào.</p>
                        </td>
                    </tr>

                    <tr th:each="u : ${users}">
                        <td class="ps-4 text-muted fw-bold" th:text="'#' + ${u.userId}">1</td>

                        <td>
                            <div class="d-flex align-items-center">
                                <div class="me-3 position-relative">
                                    <img th:if="${u.avatarUrl != null && u.avatarUrl != ''}"
                                         th:src="${u.avatarUrl}"
                                         class="rounded-circle border" width="45" height="45" style="object-fit: cover;">

                                    <div th:if="${u.avatarUrl == null || u.avatarUrl == ''}"
                                         class="rounded-circle bg-primary-subtle text-primary d-flex align-items-center justify-content-center fw-bold border border-primary-subtle"
                                         style="width: 45px; height: 45px; font-size: 1.2rem;">
                                        <span th:text="${#strings.substring(u.fullname, 0, 1)}">A</span>
                                    </div>
                                </div>
                                <div>
                                    <h6 class="mb-0 fw-bold text-dark" th:text="${u.fullname}">Nguyen Van A</h6>
                                    <small class="text-muted" th:text="'@' + ${#strings.substringBefore(u.email, '@')}">@username</small>
                                </div>
                            </div>
                        </td>

                        <td>
                            <div class="d-flex flex-column">
                                <small class="mb-1">
                                    <i class="fas fa-envelope me-2 text-muted" style="width: 15px;"></i>
                                    <span th:text="${u.email}">email@com</span>
                                </small>
                                <small>
                                    <i class="fas fa-phone me-2 text-muted" style="width: 15px;"></i>
                                    <span th:text="${u.phone != null ? u.phone : '---'}">098...</span>
                                </small>
                            </div>
                        </td>

                        <td class="text-center">
                                    <span th:if="${u.userType.typeName == 'ADMIN'}"
                                          class="badge bg-danger-subtle text-danger border border-danger-subtle rounded-pill px-3">
                                        <i class="fas fa-user-shield me-1"></i> ADMIN
                                    </span>

                            <span th:if="${u.userType.typeName != 'ADMIN'}"
                                  class="badge bg-info-subtle text-info-emphasis border border-info-subtle rounded-pill px-3">
                                        <i class="fas fa-user me-1"></i> Khách hàng
                                    </span>
                        </td>

                        <td class="text-end pe-4">
                            <a th:href="@{'/admin/users/edit/' + ${u.userId}}"
                               class="btn btn-outline-warning btn-sm rounded-circle me-1"
                               title="Chỉnh sửa" data-bs-toggle="tooltip">
                                <i class="fas fa-edit"></i>
                            </a>
                            <a th:href="@{'/admin/users/delete/' + ${u.userId}}"
                               class="btn btn-outline-danger btn-sm rounded-circle"
                               onclick="return confirm('CẢNH BÁO: Bạn có chắc chắn muốn xóa người dùng này?');"
                               title="Xóa" data-bs-toggle="tooltip">
                                <i class="fas fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card-footer bg-white py-3 border-top-0"></div>
    </div>
</div>

<script>
    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
    var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
        return new bootstrap.Tooltip(tooltipTriggerEl)
    })
</script>

</body>
</html>
